<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELE TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .contenedor { width: 90%; max-width: 500px; padding: 20px; border: 2px solid red; border-radius: 20px; background: #111; }
        iframe { width: 100%; height: 300px; border: none; border-radius: 10px; background: #000; }
        .btn { background: red; color: white; border: none; padding: 15px; width: 100%; font-weight: bold; border-radius: 10px; margin-top: 20px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>INTELE TV</h1>
        
        <div id="reproductor">
            <p>Presiona el botón para conectar señal</p>
        </div>

        <button class="btn" onclick="cargarVideo()">CONECTAR EN VIVO</button>
    </div>

    <script>
        function cargarVideo() {
            // El secreto: usamos un reproductor que acepta enlaces HTTP dentro de HTTPS
            var urlVideo = 'http://intele.ddns.net/live/0/hls.m3u8';
            var frame = '<iframe src="https://sr-player.vercel.app/?url=' + urlVideo + '" allowfullscreen allow="autoplay"></iframe>';
            document.getElementById('reproductor').innerHTML = frame;
        }
    </script>
</body>
</html>
