<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELE TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { width: 90%; max-width: 400px; padding: 30px; border: 3px solid #ff0000; border-radius: 25px; background: #111; box-shadow: 0 0 30px rgba(255,0,0,0.5); }
        h1 { font-size: 2rem; margin-bottom: 10px; color: #ff0000; text-shadow: 2px 2px #000; }
        p { color: #ccc; margin-bottom: 25px; }
        .btn-play { background: #ff0000; color: white; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 5px 15px rgba(255,0,0,0.4); }
        .btn-play:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="card">
        <h1>INTELE TV</h1>
        <p>Presiona el botón para abrir la señal directa en tu celular</p>
        
        <button class="btn-play" onclick="abrirSinal()">VER EN VIVO</button>
    </div>

    <script>
        function abrirSinal() {
            // El truco: mandamos al usuario a un reproductor web externo que sí acepta HTTP
            var urlVideo = 'http://intele.ddns.net/live/0/hls.m3u8';
            window.location.href = 'https://plonr.com/player?url=' + urlVideo;
        }
    </script>

</body>
</html>
