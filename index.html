<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELE TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { width: 90%; max-width: 450px; border: 2px solid #ff0000; border-radius: 20px; padding: 25px; background: #111; box-shadow: 0 0 30px rgba(255,0,0,0.2); }
        h1 { color: #ff0000; margin-bottom: 20px; font-size: 1.8rem; letter-spacing: 2px; }
        video { width: 100%; border-radius: 12px; background: #000; border: 1px solid #333; }
        .btn-play { background: #ff0000; color: white; border: none; padding: 20px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; cursor: pointer; width: 100%; margin-top: 25px; transition: 0.3s; }
        .btn-play:active { transform: scale(0.95); background: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>INTELE TV</h1>
        <video id="tv" playsinline controls poster="https://img.icons8.com/fluent/512/television.png"></video>
        <button class="btn-play" onclick="conectar()">ENCENDER TELEVISIÓN</button>
    </div>

    <script>
        function conectar() {
            var v = document.getElementById('tv');
            // Este nuevo "puente" es más rápido y estable para iPhone
            var videoUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('http://intele.ddns.net/live/0/hls.m3u8');
            
            v.src = videoUrl;
            v.play().catch(function() {
                // Segundo intento por si el primero falla
                v.load();
                v.play();
            });
        }
    </script>
</body>
</html>
