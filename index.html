<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELE TV</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { width: 95%; max-width: 500px; }
        video { width: 100%; border-radius: 15px; background: #111; border: 2px solid #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .btn-play { background: #ff0000; color: white; border: none; padding: 20px 40px; font-size: 1.4rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 30px; width: 100%; }
        p { color: #888; font-size: 0.9rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>INTELE TV</h1>
        <video id="video" playsinline controls poster="https://cdn-icons-png.flaticon.com/512/716/716429.png"></video>
        <button class="btn-play" onclick="conectar()">ENCENDER TELE</button>
        <p>Al picar el botón, el video iniciará automáticamente.</p>
    </div>

    <script>
        function conectar() {
            var video = document.getElementById('video');
            // Este es tu enlace directo. Al presionar el botón, el iPhone quita el bloqueo de seguridad.
            var url = 'http://intele.ddns.net/live/0/hls.m3u8';
            
            video.src = url;
            video.play().catch(function(error) {
                // Si falla, le avisamos al usuario que refresque
                alert("Si no carga, por favor recarga la página y vuelve a intentar.");
            });
        }
    </script>
</body>
</html>
