<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELE TV</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .logo { width: 100px; margin-bottom: 20px; }
        video { width: 100%; max-width: 100%; border: none; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        h1 { font-size: 1.2rem; letter-spacing: 2px; }
        .btn-play { background: #ff0000; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>INTELE EN VIVO</h1>
    <video id="video" controls autoplay playsinline></video>
    <p>Si no carga, dale Play o recarga la página</p>

    <script>
        var video = document.getElementById('video');
        // REEMPLAZA ESTA IP SI CAMBIA EN EL FUTURO
        var videoSrc = 'http://intele.ddns.net/live/0/hls.m3u8'; 

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
