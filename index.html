<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTELE TV</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .box { width: 90%; max-width: 400px; padding: 20px; border: 2px solid red; border-radius: 15px; text-align: center; }
        video { width: 100%; border-radius: 5px; }
        button { background: red; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 10px; width: 100%; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>INTELE TV</h1>
        <video id="tv" controls playsinline></video>
        <button onclick="document.getElementById('tv').src='http://intele.ddns.net/live/0/hls.m3u8'; document.getElementById('tv').play();">
            REPRODUCIR AHORA
        </button>
    </div>
</body>
</html>
